<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无记 · AVYAKATA</title>
  <meta name="description" content="记录，而获得自己" />
  <meta name="theme-color" content="#f5f0e6" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f5f0e6'/%3E%3Ctext x='50' y='64' text-anchor='middle' font-size='52' font-family='serif' fill='%231a1a1a'%3E无%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- Layer 1 · 静态纸张：双光斜射 + 纤维叠加，褶皱更具象 -->
  <svg class="paper-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <filter id="paper" x="0%" y="0%" width="100%" height="100%">
        <!-- 大尺度褶皱（低频） -->
        <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="3" result="wrinkle"/>
        <!-- 纸面纤维（高频） -->
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="fiber"/>

        <!-- 主光：暖色，135°，制造亮面 -->
        <feDiffuseLighting in="wrinkle" lighting-color="#f5f0e6" surfaceScale="3.2" diffuseConstant="1.2" result="litWarm">
          <feDistantLight azimuth="135" elevation="50"/>
        </feDiffuseLighting>
        <!-- 副光：冷色，315°，制造阴影对比 -->
        <feDiffuseLighting in="wrinkle" lighting-color="#e8e0d0" surfaceScale="2.0" diffuseConstant="0.6" result="litCool">
          <feDistantLight azimuth="315" elevation="35"/>
        </feDiffuseLighting>

        <!-- 冷暖光相加（k2=0.55 控制冷光权重，避免太灰） -->
        <feComposite in="litCool" in2="litWarm" operator="arithmetic" k1="0" k2="0.55" k3="0.45" k4="0" result="paper"/>

        <!-- 纤维纹理蒙在褶皱之上 -->
        <feComposite in="fiber" in2="paper" operator="in" result="fiberOverlay"/>
        <feMerge>
          <feMergeNode in="paper"/>
          <feMergeNode in="fiberOverlay"/>
        </feMerge>
      </filter>
    </defs>
    <rect width="100%" height="100%" filter="url(#paper)"/>
  </svg>

  <!-- Layer 2 · 罫紙网格（静止） -->
  <div class="koushi" aria-hidden="true"></div>

  <!-- Layer 3 · 动态光斑（缓慢漂浮） -->
  <div class="drift" aria-hidden="true"></div>

  <!-- Layer 4 · 主内容 -->
  <main class="stage">
    <div class="content">
      <h1 class="title">
        <span class="zh">无记</span>
        <span class="bar" aria-hidden="true">|</span>
        <span class="en">AVYAKATA</span>
      </h1>

      <p class="subtitle">记录 · 而获得自己</p>

      <nav class="links" aria-label="主导航">
        <a href="https://openwalk.top" target="_blank" rel="noopener">
          <span class="leader" aria-hidden="true"></span>
          <span class="label">随笔</span>
          <span class="desc">blog.openwalk.top</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>
      </nav>
    </div>
  </main>
</body>
</html>
