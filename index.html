<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无记 · AVYAKATA</title>
  <meta name="description" content="记录，而获得自己" />
  <meta name="theme-color" content="#f5f0e6" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f5f0e6'/%3E%3Ctext x='50' y='64' text-anchor='middle' font-size='52' font-family='serif' fill='%231a1a1a'%3E无%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500;700&family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="washi">

  <!-- ─── Washi-only layers · 褶皱 + 罫紙 + 光斑 ─── -->
  <svg class="paper-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <filter id="paper" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.0035" numOctaves="2" seed="3" result="wrinkleBig"/>
        <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7" result="wrinkleMid"/>
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" seed="11" result="fiber"/>
        <feComposite in="wrinkleMid" in2="wrinkleBig" operator="arithmetic" k1="0" k2="0.4" k3="0.6" result="wrinkle"/>
        <feDiffuseLighting in="wrinkle" lighting-color="#f5f0e6" surfaceScale="4.5" diffuseConstant="1.2" result="litWarm">
          <feDistantLight azimuth="135" elevation="55"/>
        </feDiffuseLighting>
        <feDiffuseLighting in="wrinkle" lighting-color="#d8d0c0" surfaceScale="2.8" diffuseConstant="0.7" result="litCool">
          <feDistantLight azimuth="315" elevation="32"/>
        </feDiffuseLighting>
        <feComposite in="litCool" in2="litWarm" operator="arithmetic" k1="0" k2="0.4" k3="0.6" k4="0" result="paper"/>
        <feComposite in="fiber" in2="paper" operator="in" result="fiberOverlay"/>
        <feMerge>
          <feMergeNode in="paper"/>
          <feMergeNode in="fiberOverlay"/>
        </feMerge>
      </filter>
    </defs>
    <rect width="100%" height="100%" filter="url(#paper)"/>
  </svg>

  <div class="koushi" aria-hidden="true"></div>
  <div class="drift" aria-hidden="true"></div>

  <!-- ─── Handdrawn-only layer · 笔记本点阵 ─── -->
  <div class="dot-bg" aria-hidden="true"></div>

  <!-- ─── 主体内容（Apple-style 浮动卡片） ─── -->
  <main class="stage">
    <article class="card" aria-label="无记入口">
      <div class="content">
        <h1 class="title">
          <span class="zh">无记</span>
          <span class="bar" aria-hidden="true">|</span>
          <span class="en">AVYAKATA</span>
        </h1>

        <p class="subtitle">记录 · 而获得自己</p>

        <nav class="links" aria-label="主导航">
          <a href="https://openwalk.top" target="_blank" rel="noopener">
            <span class="leader" aria-hidden="true"></span>
            <span class="label">随笔</span>
            <span class="desc">blog.openwalk.top</span>
            <span class="arrow" aria-hidden="true">↗</span>
          </a>
        </nav>

        <p class="signature" aria-hidden="true">— 记录，而获得自己</p>
      </div>
    </article>
  </main>

  <!-- ─── 左下角主题切换器 ─── -->
  <nav class="theme-switcher" aria-label="主题切换">
    <button type="button" data-set-theme="washi" aria-pressed="true">禅</button>
    <span class="sep" aria-hidden="true">·</span>
    <button type="button" data-set-theme="handdrawn" aria-pressed="false">手绘</button>
  </nav>

  <script>
    (function () {
      const body = document.body;
      const buttons = document.querySelectorAll('[data-set-theme]');
      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          const theme = btn.getAttribute('data-set-theme');
          if (!theme) return;
          body.setAttribute('data-theme', theme);
          buttons.forEach(function (b) {
            b.setAttribute(
              'aria-pressed',
              b.getAttribute('data-set-theme') === theme ? 'true' : 'false'
            );
          });
        });
      });
    })();
  </script>
</body>
</html>
