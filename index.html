<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="无记">
    <meta property="og:description" content="记录，而获得自己">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jeekeagle.github.io/wuji">
    <meta property="og:image" content="./show.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="无记">
    <meta name="twitter:description" content="记录，而获得自己">
    <meta name="twitter:image" content="./show.jpg">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f4f1ea'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='56' font-family='serif' fill='%231a1a1a'%3E无%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body data-theme="paper">

    <header class="corner corner-tl">W&Uacute;J&Igrave;</header>

    <nav class="corner corner-tr" aria-label="主导航">
        <a href="https://jeekeagle.github.io/wuji-blog/" target="_blank" rel="noopener">随笔</a>
        <span class="sep">/</span>
        <a href="https://jeekeagle.github.io/zero-perspective-hub/" target="_blank" rel="noopener">视角</a>
        <span class="sep">/</span>
        <a href="https://jeekeagle.github.io/ZeroPark/" target="_blank" rel="noopener">园</a>
    </nav>

    <footer class="corner corner-bl">记录，而获得自己</footer>

    <nav class="corner corner-br" aria-label="主题切换">
        <button type="button" data-set-theme="paper" aria-pressed="true">纸</button>
        <span class="sep">/</span>
        <button type="button" data-set-theme="dark" aria-pressed="false">夜</button>
    </nav>

    <main class="stage">
        <figure class="frame">
            <img src="./show.jpg" alt="天 · 地 · 人" decoding="async">
            <figcaption>
                <em>N° 01</em>
                <span class="dot">·</span>
                <strong>云之下</strong>
                <span class="dot">·</span>
                <em>2026 · 海南</em>
            </figcaption>
        </figure>

        <h1 class="title">
            <span>无</span><span class="accent">记</span>
        </h1>
        <p class="subtitle">A QUIET INDEX</p>
    </main>

    <script>
        (function () {
            var STORAGE = 'wuji-theme';
            var body = document.body;
            var buttons = document.querySelectorAll('[data-set-theme]');

            function apply(theme) {
                body.setAttribute('data-theme', theme);
                buttons.forEach(function (b) {
                    b.setAttribute('aria-pressed', b.getAttribute('data-set-theme') === theme ? 'true' : 'false');
                });
                try { localStorage.setItem(STORAGE, theme); } catch (e) {}
            }

            buttons.forEach(function (b) {
                b.addEventListener('click', function () {
                    var t = b.getAttribute('data-set-theme');
                    if (t) apply(t);
                });
            });

            try {
                var saved = localStorage.getItem(STORAGE);
                if (saved === 'paper' || saved === 'dark') apply(saved);
            } catch (e) {}
        })();
    </script>
</body>
</html>
