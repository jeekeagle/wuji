<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无记 · 王益国的数字花园</title>
    <meta name="description" content="记录 · 而获得自己">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23F4F8FB'/%3E%3Ctext x='50' y='64' text-anchor='middle' font-size='52' font-family='serif' fill='%231D1D1F'%3E无%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body data-theme="ink">

    <!-- ─── 四角定位 ─── -->
    <header class="corner-tl">
        王益国 · 无记
    </header>

    <nav class="corner-tr" aria-label="主导航">
        <a href="https://jeekeagle.github.io/wuji-blog/" target="_blank" rel="noopener" data-theme-target="wuji-blog">随笔</a>
        <span class="nav-sep" aria-hidden="true">·</span>
        <a href="https://jeekeagle.github.io/zero-perspective-hub/" target="_blank" rel="noopener">视角</a>
        <span class="nav-sep" aria-hidden="true">·</span>
        <a href="https://jeekeagle.github.io/ZeroPark/" target="_blank" rel="noopener">园</a>
    </nav>

    <footer class="corner-bl">
        <span class="footer-meta">WUJI / 记录，而获得自己</span>
    </footer>

    <nav class="corner-br" aria-label="主题切换">
        <button type="button" data-set-theme="ink" aria-pressed="true">INK</button>
        <span class="nav-sep" aria-hidden="true">·</span>
        <button type="button" data-set-theme="washi" aria-pressed="false">禅</button>
        <span class="nav-sep" aria-hidden="true">·</span>
        <button type="button" data-set-theme="newsprint" aria-pressed="false">报</button>
        <span class="nav-sep" aria-hidden="true">·</span>
        <button type="button" data-set-theme="terminal" aria-pressed="false">$</button>
        <span class="nav-sep" aria-hidden="true">·</span>
        <button type="button" data-set-theme="handdrawn" aria-pressed="false">绘</button>
    </nav>

    <!-- ─── 焦点区 · 45vw · 55% 负空间 ─── -->
    <main class="focal-point">
        <div class="focal-anchor" aria-label="无记入口">
            <div class="anchor-mark">
                <span class="anchor-char">无</span>
                <span class="anchor-char anchor-char-accent">记</span>
            </div>
            <div class="anchor-rule" aria-hidden="true"></div>
            <div class="anchor-meta">
                <span>记录 · 而获得自己</span>
                <span class="anchor-year">2026</span>
            </div>
        </div>
        <p class="focal-caption">
            A QUIET INDEX · 随笔 · 视角 · 园
        </p>
    </main>

    <script>
        (function () {
            const body = document.body;
            const buttons = document.querySelectorAll('[data-set-theme]');
            buttons.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    const theme = btn.getAttribute('data-set-theme');
                    if (!theme) return;
                    body.setAttribute('data-theme', theme);
                    buttons.forEach(function (b) {
                        b.setAttribute(
                            'aria-pressed',
                            b.getAttribute('data-set-theme') === theme ? 'true' : 'false'
                        );
                    });
                });
            });
        })();
    </script>
</body>
</html>
