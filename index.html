    <script>
        // 标题字号随视口收缩（参考站 TextShrink 行为：trigger width 750px）
        (function () {
            var logo = document.querySelector('.logo a');
            if (!logo) return;
            function fit() {
                if (window.innerWidth < 750) {
                    var ratio = window.innerWidth / 750;
                    var size = Math.max(14, Math.round(22 * ratio));
                    logo.style.fontSize = size + 'px';
                } else {
                    logo.style.fontSize = '';
                }
            }
            window.addEventListener('resize', fit);
            fit();
        })();
    </script>
