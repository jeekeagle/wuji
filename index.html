<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无记</title>
  <meta name="description" content="记录，而获得自己" />
  <meta name="theme-color" content="#f7f5f0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f7f5f0'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='60' font-family='serif' fill='%23a52a2a'%3E記%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- 引首章：右上角竖排小字，模拟传统书画"压角章" -->
  <aside class="mark" aria-label="引首章">
    <span>丙午年制</span>
  </aside>

  <main class="stage">
    <div class="axis">
      <h1 class="brand">
        <span class="char">无</span>
        <span class="char ink-accent">记</span>
      </h1>

      <div class="subtitle">
        <span class="zh">记录 · 而获得自己</span>
        <span class="en">Record, then to obtain oneself.</span>
      </div>

      <!-- 朱砂印章：核心视觉锚点 -->
      <div class="seal" aria-label="印章">
        <span>記</span>
      </div>

      <nav class="links" aria-label="主导航">
        <a href="https://openwalk.top" target="_blank" rel="noopener">
          <span class="row">
            <span class="label">随笔</span>
            <span class="line" aria-hidden="true"></span>
            <span class="arrow" aria-hidden="true">↗</span>
          </span>
          <span class="desc">blog.openwalk.top</span>
        </a>
      </nav>
    </div>
  </main>

  <!-- 落款：左下角英文小字 -->
  <footer class="signature">
    <span>jeekeagle · MMXXVI</span>
  </footer>
</body>
</html>
